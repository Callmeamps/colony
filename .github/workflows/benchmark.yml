name: Scout Performance Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM

jobs:
  benchmark:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run Scout CI benchmark
      run: |
        cd benchmarks
        python scout_ci.py
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: scout_ci_results.json
    
    - name: Comment benchmark results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const results = JSON.parse(fs.readFileSync('scout_ci_results.json', 'utf8'));
          
          const body = `## ⚡ Scout Performance Benchmark
          
          **Target**: <50ms per classification
          
          | Metric | Value | Status |
          |--------|--------|--------|
          | Avg Latency | ${results.avg_latency_ms}ms | ${results.avg_latency_ms <= 50 ? '✅' : '❌'} |
          | Pass Rate | ${results.pass_rate}% | ${results.pass_rate >= 95 ? '✅' : '❌'} |
          | Max Latency | ${results.max_latency_ms}ms | ${results.max_latency_ms <= 100 ? '✅' : '❌'} |
          
          **Overall**: ${results.overall_pass ? '✅ **PASS**' : '❌ **FAIL**'}
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
    
    - name: Fail on benchmark regression
      if: steps.benchmark.outcome != 'success'
      run: exit 1